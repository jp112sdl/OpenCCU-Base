<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" >
<head>
  <title>Debug Window</title>
  <script type="text/javascript" charset="iso-8859-1" src="js/prototype.js"></script>
  <script type="text/javascript" charset="iso-8859-1" src="js/iseMD5.js"></script>
</head>
<body style="font-family:courier;font-size:8px;">
<input type="button" onclick="EnableTelnet();" value="Enable Telnet" />
<hr />
<input type="button" onclick="ProtoAll();" value="Alle Datenpunkte protokollieren" />
<input type="button" onclick="Proto1000();" value="1000 x Anwesenheit umschalten" />
<hr />
Syslog IP Address: <input id="logip" type="text" value="192.168.0.76" /><br />
<input type="button" onclick="Log(0);" value="Start logging (verbose)" />
<input type="button" onclick="Log(1);" value="Start logging (info)" />
<input type="button" onclick="Log(2);" value="Start logging (error)" />
<input type="button" onclick="Log(3);" value="Start logging (crash)" />
<hr />
MD5 String: <input id="md5str" type="text" value="Testnachricht" /><br />
<input type="button" onclick="DoMD5();" value="MD5 erstellen" />
<hr />
<input type="button" onclick="Start();" value="START" />
<input type="button" onclick="Stop();" value="STOP" />
<hr />
<div id="debugwindow">
</div>

<script type="text/javascript">

  dbgout = function(txt)
  {
    var dt = new Date();
    new Insertion.Bottom( "debugwindow", "<br>"+dt.toLocaleString()+" : "+txt );
  }
  
//  var startTicks = new Date().getTime();
//  dbgout("0123456789");
//  dbgout("0123456789");
//  var endTicks = new Date().getTime();
//  var diffTicks = endTicks - startTicks;
//  alert(diffTicks);

  bIsRunning = false;
  oAjaxCall = null;
  
  function Start()
  {
    bIsRunning = true;
    DoAjaxCall();
    dbgout("Starting Memory Leak Test.");
  }
  
  function Stop()
  {
    bIsRunning = false;
    dbgout("Stopping Memory Leak Test.");
  }
  
  function DoMD5()
  {
    dbgout("Start MD5...");
    var o = new iseMD5();
    var s = o.hex_md5( $F("md5str") );
    dbgout("MD5 for ["+$F("md5str")+"] = ["+s+"]");
    dbgout("Finish MD5...");
  }

  function DoAjaxCall()
  {
    if( bIsRunning )
    {
      var opts =
      {
        method: 'post',
        postBody: '',
        onComplete: function(t)
        {
          dbgout( "Ajax Call returned: "+t.responseText );
          delete oAjaxCall;
          DoAjaxCall();
        }
      };
      oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
    }
  }

  function ProtoAll()
  {
    var pb = '';
    pb += 'object oChannels = dom.GetObject( ID_CHANNELS );';
    pb += 'string s;';
    pb += 'foreach(s,oChannels.EnumUiIDs( iufVisible ))';
    pb += '{';
    pb += '  object oCH = dom.GetObject(s);';
    pb += '  if(oCH)';
    pb += '  {';
    pb += '    string s2;';
    pb += '    foreach(s2,oCH.DPs().EnumIDs())';
    pb += '    {';
    pb += '      object oDP = dom.GetObject(s2);';
    pb += '      if(oDP)';
    pb += '      {';
    pb += '        Write("<br />Start logging for ");';
    pb += '        Write(oDP.Name());';
    pb += '        Write("...");';
    pb += '        if(oDP.DPArchive(true))';
    pb += '        {';
    pb += '          WriteLine("ok.");';
    pb += '        }';
    pb += '        else';
    pb += '        {';
    pb += '          WriteLine("failed.");';
    pb += '        }';
    pb += '      }';
    pb += '    }';
    pb += '  }';
    pb += '}';
    var opts =
    {
      method: 'post',
      postBody: pb,
      onComplete: function(t)
      {
        dbgout( "Ajax Call returned: "+t.responseText );
        delete oAjaxCall;
      }
    };
    oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
  }

  function EnableTelnet()
  {
    var pb = '';
    pb += 'system.Exec("inetd");';
    var opts =
    {
      method: 'post',
      postBody: pb,
      onComplete: function(t)
      {
        dbgout( "Ajax Call returned: "+t.responseText );
        delete oAjaxCall;
      }
    };
    oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
  }
  
  function Proto1000()
  {
    var pb = '';
    pb += 'string s;';
    pb += 'foreach(s,system.GenerateEnum(0,999))';
    pb += '{';
    pb += '  object o = dom.GetObject(950);';
    pb += '  if(o)';
    pb += '  {';
    pb += '    if(o.State()==0)';
    pb += '    {';
    pb += '      o.State(1);';
    pb += '    }';
    pb += '    else';
    pb += '    {';
    pb += '      o.State(0);';
    pb += '    }';
    pb += '  }';
    pb += '}';
    var opts =
    {
      method: 'post',
      postBody: pb,
      onComplete: function(t)
      {
        dbgout( "Ajax Call returned: "+t.responseText );
        delete oAjaxCall;
      }
    };
    oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
  }

  function EnableTelnet()
  {
    var pb = '';
    pb += 'system.Exec("inetd");';
    var opts =
    {
      method: 'post',
      postBody: pb,
      onComplete: function(t)
      {
        dbgout( "Ajax Call returned: "+t.responseText );
        delete oAjaxCall;
      }
    };
    oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
  }
  
  function Log(iLevel)
  {
    var sLogIP = $F("logip");
    var pb = '';
    pb += 'system.LogLevel('+iLevel+');';
    pb += 'system.SyslogIPAddress("'+sLogIP+'");';
    var opts =
    {
      method: 'post',
      postBody: pb,
      onComplete: function(t)
      {
        dbgout( "Ajax Call returned: "+t.responseText );
        delete oAjaxCall;
      }
    };
    oAjaxCall = new Ajax.Request("/esp/exec.htm?sid="+SessionId, opts);
  }


</script>

</body>
</html>
