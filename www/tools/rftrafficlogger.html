<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RFTrafficLogger</title>
<style>
  :root {
    --bg: #14171c; --bg2: #1c2027; --bg3: #242a33; --border: #333a45;
    --fg: #d6dbe3; --fg-dim: #8a93a2; --accent: #4da3ff;
    --rx: #58c470; --tx: #f0a04b; --hmip: #7f8fd4; --warn: #e05c5c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--fg);
    font: 13px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px; padding: 8px 14px;
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .status { color: var(--fg-dim); font-size: 12px; }
  .status b { color: var(--fg); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--rx); margin-right: 4px; vertical-align: baseline; }
  .dot.off { background: var(--warn); }
  .dot.paused { background: var(--tx); }
  .spacer { flex: 1; }
  select, input[type=text], button {
    background: var(--bg3); color: var(--fg); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px; font: inherit; }
  input[type=text] { width: 190px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #10131a; border-color: var(--accent); font-weight: 600; }
  .tabs { display: flex; gap: 4px; }
  .filters { display: flex; gap: 8px; padding: 8px 14px; background: var(--bg2);
    border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .filters label { color: var(--fg-dim); font-size: 12px; }
  main { flex: 1; overflow: auto; }
  /* Tabelle */
  table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  thead th { position: sticky; top: 0; background: var(--bg3); text-align: left;
    padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap;
    cursor: default; z-index: 1; }
  tbody td { padding: 3px 8px; border-bottom: 1px solid #20252d; white-space: nowrap;
    font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: #232936; }
  td.payload, td.mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px; }
  .dir-RX { color: var(--rx); font-weight: 600; }
  .dir-TX { color: var(--tx); font-weight: 600; }
  .proto-HMIP td { opacity: .75; }
  .proto-HMIP .proto { color: var(--hmip); }
  .bcast-name { color: var(--hmip); }
  .bcast-hex { color: var(--hmip); font-weight: 700; text-decoration: underline dotted; cursor: help; }
  .via-direkt { color: var(--fg-dim); font-size: 11.5px; }
  .via-lgw { color: #d4b04f; font-weight: 600; font-size: 11.5px; }
  .devname { color: var(--fg); }
  .devaddr { color: var(--fg-dim); font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; }
  .rssi-good { color: var(--rx); } .rssi-mid { color: var(--tx); } .rssi-bad { color: var(--warn); }
  .flags, .typename { font-size: 11.5px; }
  .typename { color: var(--accent); }
  .more { padding: 10px 14px; color: var(--fg-dim); }
  /* Analyse */
  .stats-wrap { padding: 14px; display: flex; flex-direction: column; gap: 16px; max-width: 1250px; }
  .cards { display: flex; gap: 10px; flex-wrap: wrap; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 16px; min-width: 110px; }
  .card .num { font-size: 20px; font-weight: 700; }
  .card .lbl { color: var(--fg-dim); font-size: 11.5px; }
  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .panel h2 { margin: 0 0 10px; font-size: 13.5px; font-weight: 600; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: .04em; }
  canvas { width: 100%; display: block; }
  .devtable td, .devtable th { padding: 4px 10px; }
  .devtable th { cursor: pointer; user-select: none; }
  .bar-bg { background: var(--bg3); border-radius: 3px; height: 10px; min-width: 120px; position: relative; overflow: hidden; }
  .bar-rx, .bar-tx { position: absolute; top: 0; bottom: 0; }
  .bar-rx { background: var(--rx); } .bar-tx { background: var(--tx); }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; font-size: 11.5px; color: var(--fg-dim); }
  .legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
  #tooltip { position: fixed; pointer-events: none; background: #0d0f13ee; border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 9px; font-size: 11.5px; display: none; z-index: 10; white-space: pre; }
</style>
</head>
<body>
<header>
  <h1>RF<span>TrafficLogger</span>
    <small id="version" style="color:var(--fg-dim);font-size:11px;font-weight:400"></small></h1>
  <div class="tabs">
    <button id="tabTelegrams" class="active">Telegramme</button>
    <button id="tabStats">Analyse</button>
  </div>
  <span class="status" id="status"><span class="dot off"></span>verbinde&hellip;</span>
  <div class="spacer"></div>
  <label class="status">Datum
    <select id="dateSel"></select>
  </label>
  <button id="pauseBtn" title="Live-Aktualisierung anhalten">&#10074;&#10074; Pause</button>
  <button id="csvBtn" title="Gefilterte Telegramme als CSV exportieren">CSV</button>
  <button id="devBtn" title="Ger&auml;teliste neu laden">Ger&auml;te &#8635;</button>
</header>

<div class="filters" id="filterBar">
  <input type="text" id="fSearch" placeholder="Suche (Name, Adresse, Payload &hellip;)">
  <select id="fDir">
    <option value="">Richtung: alle</option>
    <option value="RX">nur RX</option>
    <option value="TX">nur TX</option>
  </select>
  <select id="fProto">
    <option value="">Protokoll: alle</option>
    <option value="BIDCOS">BidCos</option>
    <option value="HMIP">HmIP</option>
  </select>
  <select id="fVia">
    <option value="">Weg: alle</option>
    <option value="direkt">direkt (Funkmodul)</option>
    <option value="lgw">via LAN-Gateway</option>
  </select>
  <select id="fType"><option value="">Typ: alle</option></select>
  <select id="fDev"><option value="">Ger&auml;t: alle</option></select>
  <label><input type="checkbox" id="fHideBcast"> Broadcasts ausblenden</label>
  <span class="status" id="filterInfo"></span>
</div>

<main id="viewTelegrams">
  <table>
    <thead><tr>
      <th>Zeit</th><th></th><th>Proto</th><th title="direkt = lokales Funkmodul, via = Funk-LAN-Gateway">Via</th>
      <th>RSSI</th><th>Len</th><th>Cnt</th>
      <th>Typ</th><th>Flags</th><th>Von</th><th>An</th><th>Payload</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="more" id="moreInfo"></div>
</main>

<main id="viewStats" style="display:none">
  <div class="stats-wrap">
    <div class="cards" id="cards"></div>
    <div class="panel">
      <h2>RSSI-Verlauf (empfangene BidCos-Telegramme)</h2>
      <canvas id="rssiChart" height="260" data-height="260"></canvas>
      <div class="legend" id="rssiLegend"></div>
    </div>
    <div class="panel">
      <h2>Telegramm-Rate (pro Minute)</h2>
      <canvas id="rateChart" height="140" data-height="140"></canvas>
    </div>
    <div class="panel">
      <h2>Telegramme pro Ger&auml;t</h2>
      <table class="devtable" id="devStats"></table>
    </div>
  </div>
</main>

<div id="tooltip"></div>

<script>
"use strict";

/* ------------------------------------------------- Konstanten / Dekodierung */

const API = "rftrafficlogger-api.cgi";
const POLL_MS = 2500;
const MAX_KEEP = 50000;     // Telegramme im Speicher
const MAX_ROWS = 1000;      // gerenderte Tabellenzeilen

// BidCos Nachrichtentypen (vgl. AskSinAnalyzer / BidcosTelegram.h)
const MSG_TYPES = {
  0x00: "DEVINFO", 0x01: "CONFIG", 0x02: "ACK", 0x03: "AES_REPLY",
  0x04: "SEND_AES", 0x09: "TESTMODE", 0x10: "INFO", 0x11: "ACTION",
  0x12: "WAKEUP", 0x13: "CALL_CCU", 0x3d: "ALARM", 0x3e: "SWITCH",
  0x3f: "TIMESTAMP", 0x40: "REMOTE", 0x41: "SENSOR", 0x42: "SWITCH_LEVEL",
  0x51: "DATALOG_CMD", 0x52: "DATALOG_DATA", 0x53: "SENSOR_DATA",
  0x54: "GAS_EVENT", 0x55: "TEXT_MSG", 0x56: "TEXT_ORG",
  0x58: "CLIMATE_EVENT", 0x59: "SET_TEAM_TEMP", 0x5a: "THERMAL_CONTROL",
  0x5e: "POWER_EVENT_CYCLIC", 0x5f: "POWER_EVENT",
  // 0x60/0x61: HM-ES-TX-WM IEC-Energiezaehler (eQ-3 rftypes rf_es_tx_wm.xml);
  // Kanal (POWERMETER_IEC1/IEC2) steckt im 1. Payload-Byte, nicht im Typ
  0x60: "IEC_POWER_EVENT_CYCLIC", 0x61: "IEC_POWER_EVENT", 0x70: "WEATHER_EVENT",
  0x71: "WEATHER_FORECAST", 0x7f: "WEATHER_REQ", 0xca: "UPDATE", 0xcb: "TRX_REGISTER"
};
const ACK_SUB = {
  0x00: "ACK", 0x01: "ACK_STATUS", 0x02: "ACK_PARAM_IGNORED", 0x03: "ACK_PARAM_CORRECTED",
  0x04: "ACK_AES_CHALLENGE", 0x80: "NACK", 0x81: "NACK_BUSY", 0x82: "NACK_OOM_PARTIAL",
  0x83: "NACK_OOM", 0x84: "NACK_TARGET_INVALID", 0x85: "NACK_CHANNEL_INVALID"
};
const FLAG_BITS = [
  [0x01, "WKUP"], [0x02, "WKMEUP"], [0x04, "BCAST"], [0x10, "BURST"],
  [0x20, "BIDI"], [0x40, "RPTED"], [0x80, "RPTEN"]
];

// Bekannte HmIP-Broadcast-/Multicastadressen (vgl. AskSinAnalyzer ccu_create_devlist).
// HmIP-Frames werden roh geloggt; diese Adressen lassen sich aber byte-aligned
// im Payload wiederfinden und namentlich aufloesen.
const HMIP_BCAST = {
  "F00001": "HmIP Multicast All Devices",
  "F00002": "HmIP Multicast All Routers",
  "F00003": "HmIP Multicast All AccessControllers",
  "F00004": "HmIP Multicast All Thermostats",
  "F00005": "HmIP Multicast All Smoke Sensors",
  "F00081": "HmIP Multicast All Permanent Listener",
  "F00082": "HmIP Multicast All Burst Listener",
  "F00083": "HmIP Multicast All Triple Burst Listener"
};

// liefert die im Payload gefundenen Multicastadressen (nur an Byte-Grenzen)
function scanHmipBcast(payload) {
  let found = null;
  for (let i = 0; i + 6 <= payload.length; i += 2) {
    const a = payload.substr(i, 6);
    if (HMIP_BCAST[a] && (!found || !found.includes(a))) (found || (found = [])).push(a);
  }
  return found;
}

// HmIP-Zentralenadresse (kommt per devlist aus /etc/config/hmip_address.conf)
const HMIP_CENTRAL_NAME = "Zentrale (CCU)";

// kommt addr byte-aligned im Hex-String vor?
function alignedHas(payload, addr) {
  let i = payload.indexOf(addr);
  while (i >= 0) {
    if (i % 2 === 0) return true;
    i = payload.indexOf(addr, i + 1);
  }
  return false;
}
function hmipHasCentral(t) {
  return !!state.hmipCentral && t.proto === "HMIP" && alignedHas(t.payload, state.hmipCentral);
}
// Name einer bekannten HmIP-Adresse (Multicast, Geraet oder Zentrale), sonst null
function hmipName(a) {
  if (HMIP_BCAST[a]) return HMIP_BCAST[a];
  const d = state.devByAddr.get(a);
  if (d) return d.name;
  if (a && a === state.hmipCentral) return HMIP_CENTRAL_NAME;
  return null;
}
// bekannte Adresse an fester Byteposition im HmIP-Frame:
// [0..3]=Header, [4..6]=Absender (Hex-Pos 8), [7..9]=Empfaenger (Hex-Pos 14)
function hmipAddrAt(t, hexPos) {
  const a = t.payload.substr(hexPos, 6);
  return hmipName(a) !== null ? a : null;
}

function decodeType(t, payload) {
  if (t === 0x02) {
    const sub = parseInt(payload.slice(0, 2), 16);
    if (!isNaN(sub) && ACK_SUB[sub] !== undefined) return ACK_SUB[sub];
    return "ACK";
  }
  return MSG_TYPES[t] || ("0x" + t.toString(16).padStart(2, "0").toUpperCase());
}
function decodeFlags(f) {
  const out = [];
  for (const [bit, name] of FLAG_BITS) if (f & bit) out.push(name);
  return out;
}
// grobe Airtime-Schaetzung fuer BidCos (10 kbit/s, inkl. Preamble/Sync/CRC)
function airtimeMs(len) { return (len + 13) * 0.8; }

/* ------------------------------------------------- State */

const state = {
  telegrams: [],          // chronologisch
  offsets: { mmd: 0, rfd: 0 },  // Datei-Offsets je Logquelle
  ifaces: new Set(),      // gesehene Funk-LAN-Gateways (IFACE aus rfd-Log)
  date: null,             // ausgewaehltes Datum
  live: true,             // Datum == neueste Datei -> Polling
  paused: false,
  devByAddr: new Map(),   // "5A3F01" -> {name, serial, type}
  types: new Set(),
  addrs: new Set(),
  hmipSeen: new Set(),    // an HmIP-Absender-/Empfaengerposition gesehene Adressen
  filterDirty: true,
  tab: "telegrams",
  pollTimer: null,
  centralAddr: null,
  hmipCentral: null       // HmIP-Funkadresse der Zentrale, z.B. "BA664A"
};

const $ = id => document.getElementById(id);

/* ------------------------------------------------- Parsen */

const LINE_RE = /^(\d{4}-\d{2}-\d{2}) (\d{2}):(\d{2}):(\d{2})\.(\d{3}) (RX|TX) (BIDCOS|HMIP) (.*)$/;

function parseLine(line) {
  const m = LINE_RE.exec(line);
  if (!m) return null;
  const [, d, hh, mm, ss, ms, dir, proto, rest] = m;
  const ts = new Date(`${d}T${hh}:${mm}:${ss}.${ms}`).getTime();
  const t = { ts, time: `${hh}:${mm}:${ss}.${ms}`, dir, proto,
              len: 0, cnt: null, flags: 0, type: null, from: null, to: null,
              rssi: null, payload: "", raw: line };
  for (const part of rest.split(" ")) {
    const eq = part.indexOf("=");
    if (eq < 0) continue;
    const k = part.slice(0, eq), v = part.slice(eq + 1);
    switch (k) {
      case "LEN":   t.len = parseInt(v, 16); break;
      case "CNT":   t.cnt = parseInt(v, 16); break;
      case "FLAGS": t.flags = parseInt(v, 16); break;
      case "TYPE":  t.type = parseInt(v, 16); break;
      case "FROM":  t.from = v.toUpperCase(); break;
      case "TO":    t.to = v.toUpperCase(); break;
      case "RSSI":  { const r = parseInt(v, 10); if (r !== 0) t.rssi = r; break; }
      case "PAYLOAD": t.payload = v; break;
      case "DATA":  t.payload = v; break;
      case "IFACE": t.iface = v; break;   // Seriennummer des Funk-LAN-Gateways (rfd-Log)
    }
  }
  if (proto === "HMIP" && t.payload) t.bcast = scanHmipBcast(t.payload);
  return t;
}

function ingest(text) {
  let added = 0;
  for (const line of text.split("\n")) {
    if (!line) continue;
    const t = parseLine(line);
    if (!t) continue;
    state.telegrams.push(t);
    if (t.type !== null) state.types.add(decodeType(t.type, t.payload));
    if (t.from) state.addrs.add(t.from);
    if (t.to && t.to !== "000000") state.addrs.add(t.to);
    if (t.bcast) for (const a of t.bcast) state.addrs.add(a);
    if (t.proto === "HMIP") {
      if (t.payload.length >= 14) state.hmipSeen.add(t.payload.substr(8, 6));
      if (t.payload.length >= 20) state.hmipSeen.add(t.payload.substr(14, 6));
    }
    if (t.iface) state.ifaces.add(t.iface);
    if (t.dir === "TX" && t.proto === "BIDCOS" && t.from) state.centralAddr = t.from;
    added++;
  }
  if (state.telegrams.length > MAX_KEEP)
    state.telegrams.splice(0, state.telegrams.length - MAX_KEEP);
  return added;
}

/* ------------------------------------------------- Geraete */

async function loadDevList(refresh) {
  try {
    const r = await fetch(API + "?cmd=devlist" + (refresh ? "&refresh=1" : ""));
    const j = await r.json();
    state.devByAddr.clear();
    for (const d of (j.devices || [])) {
      const hex = d.address.toString(16).padStart(6, "0").toUpperCase();
      // mehrere Geraete koennen dieselbe RF-Adresse melden (z.B. HmIP-RCV-1
      // und RPI-RF-MOD fuer die Zentrale) - erster Eintrag gewinnt
      if (!state.devByAddr.has(hex)) state.devByAddr.set(hex, d);
    }
    if (j.hmip_central && /^[0-9A-F]{6}$/.test(j.hmip_central)) {
      state.hmipCentral = j.hmip_central;
      state.addrs.add(j.hmip_central);
    }
    state.filterDirty = true;
    render();
  } catch (e) { console.warn("devlist:", e); }
}

function devName(addr) {
  if (!addr) return "";
  if (addr === "000000") return "Broadcast";
  if (HMIP_BCAST[addr]) return HMIP_BCAST[addr];
  const d = state.devByAddr.get(addr);
  if (d) return d.name;
  if (addr === state.hmipCentral) return HMIP_CENTRAL_NAME;
  if (addr === state.centralAddr) return "Zentrale (CCU)";
  return null;
}
function devLabel(addr) {
  const n = devName(addr);
  return n === null ? addr : n;
}

/* ------------------------------------------------- Filter */

function getFilters() {
  return {
    search: $("fSearch").value.trim().toLowerCase(),
    dir: $("fDir").value,
    proto: $("fProto").value,
    via: $("fVia").value,
    type: $("fType").value,
    dev: $("fDev").value,
    hideBcast: $("fHideBcast").checked
  };
}

function filtered() {
  const f = getFilters();
  return state.telegrams.filter(t => {
    if (f.dir && t.dir !== f.dir) return false;
    if (f.proto && t.proto !== f.proto) return false;
    if (f.via === "direkt" && t.iface) return false;
    if (f.via === "lgw" && !t.iface) return false;
    if (f.via && f.via !== "direkt" && f.via !== "lgw" && t.iface !== f.via) return false;
    if (f.hideBcast && (t.to === "000000" || t.bcast)) return false;
    if (f.type && (t.type === null || decodeType(t.type, t.payload) !== f.type)) return false;
    if (f.dev && t.from !== f.dev && t.to !== f.dev &&
        !(t.bcast && t.bcast.includes(f.dev)) &&
        !(f.dev === state.hmipCentral && hmipHasCentral(t)) &&
        !(t.proto === "HMIP" &&
          (t.payload.substr(8, 6) === f.dev || t.payload.substr(14, 6) === f.dev))) return false;
    if (f.search) {
      let hmipNames = "";
      if (t.proto === "HMIP") {
        const a8 = hmipAddrAt(t, 8), a14 = hmipAddrAt(t, 14);
        if (a8) hmipNames += " " + hmipName(a8);
        if (a14) hmipNames += " " + hmipName(a14);
        if (t.bcast) hmipNames += " " + t.bcast.map(a => HMIP_BCAST[a]).join(" ");
        if (hmipHasCentral(t)) hmipNames += " " + HMIP_CENTRAL_NAME;
      }
      const hay = (t.raw + " " + (devName(t.from) || "") + " " + (devName(t.to) || "") +
        hmipNames).toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    return true;
  });
}

function rebuildFilterOptions() {
  // einzelne Gateways nur anbieten, wenn es mehr als eines gibt -
  // sonst reicht die statische Option "via LAN-Gateway"
  const viaSel = $("fVia");
  const curV = viaSel.value;
  viaSel.length = 3;   // die 3 statischen Optionen behalten
  if (state.ifaces.size > 1) {
    for (const s of [...state.ifaces].sort())
      viaSel.add(new Option("via " + s, s));
  }
  viaSel.value = curV;
  if (viaSel.selectedIndex < 0) viaSel.value = "";

  const typeSel = $("fType"), devSel = $("fDev");
  const curT = typeSel.value, curD = devSel.value;
  typeSel.length = 1;
  for (const ty of [...state.types].sort())
    typeSel.add(new Option(ty, ty));
  typeSel.value = curT;

  devSel.length = 1;
  // an HmIP-Framepositionen gesehene Adressen nur aufnehmen, wenn aufloesbar
  const addrs = new Set(state.addrs);
  for (const a of state.hmipSeen) if (hmipName(a) !== null) addrs.add(a);
  const opts = [...addrs].map(a => ({ a, label: devLabel(a) }))
    .sort((x, y) => x.label.localeCompare(y.label));
  for (const o of opts)
    devSel.add(new Option(o.label === o.a ? o.a : `${o.label} (${o.a})`, o.a));
  devSel.value = curD;
}

/* ------------------------------------------------- Tabelle */

function rssiClass(r) {
  if (r === null) return "";
  return r >= -65 ? "rssi-good" : r >= -85 ? "rssi-mid" : "rssi-bad";
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}

function addrCell(addr) {
  if (!addr) return "";
  const n = devName(addr);
  if (n === null) return `<span class="devaddr">${addr}</span>`;
  return `<span class="devname" title="${esc(addr)}${state.devByAddr.get(addr) ? " / " + esc(state.devByAddr.get(addr).serial) : ""}">${esc(n)}</span>`;
}

// Von/An-Zellen fuer HmIP: bekannte Adressen (Multicast/Zentrale) an den festen
// Framepositionen anzeigen; "An" faellt auf anderswo erkannte Multicasts zurueck
function hmipKnownAddr(a, where) {
  return `<span class="devname bcast-name" title="${a}${where ? " " + where : ""} im Payload erkannt">${esc(hmipName(a))}</span>`;
}
function hmipFromCell(t) {
  const a = hmipAddrAt(t, 8);
  return a ? hmipKnownAddr(a, "an Absenderposition") : "";
}
function hmipToCell(t) {
  const a = hmipAddrAt(t, 14);
  if (a) return hmipKnownAddr(a, "an Empf&auml;ngerposition");
  if (!t.bcast) return "";
  return t.bcast.map(x => hmipKnownAddr(x, "")).join(", ");
}

// Payload-Hex mit hervorgehobenen bekannten HmIP-Adressen. Multicast und
// Zentrale sind eindeutig genug fuer beliebige (byte-aligned) Positionen;
// Geraeteadressen nur an den festen Absender-/Empfaengerpositionen, sonst
// gaebe es Fehltreffer (kurze BidCos-Adressen bestehen aus vielen Nullbytes)
function payloadCell(t) {
  if (t.proto !== "HMIP") return esc(t.payload);
  const p = t.payload;
  let out = "", i = 0;
  while (i < p.length) {
    const a = p.substr(i, 6);
    let n = null;
    if (i % 2 === 0) {
      if (HMIP_BCAST[a]) n = HMIP_BCAST[a];
      else if (a === state.hmipCentral) n = HMIP_CENTRAL_NAME;
      else if ((i === 8 || i === 14) && state.devByAddr.has(a)) n = state.devByAddr.get(a).name;
    }
    if (n) {
      out += `<span class="bcast-hex" title="${esc(n)}">${a}</span>`;
      i += 6;
    } else {
      out += esc(p[i]);
      i++;
    }
  }
  return out;
}

function renderTable() {
  const list = filtered();
  $("filterInfo").textContent = `${list.length} von ${state.telegrams.length} Telegrammen`;
  const rows = [];
  const n = Math.min(list.length, MAX_ROWS);
  for (let i = list.length - 1; i >= list.length - n; i--) {
    const t = list[i];
    const typeStr = t.proto === "HMIP" ? "" :
      `<span class="typename">${esc(decodeType(t.type, t.payload))}</span>`;
    const flagsStr = t.proto === "HMIP" ? "" : esc(decodeFlags(t.flags).join(" "));
    rows.push(`<tr class="proto-${t.proto}">` +
      `<td>${t.time}</td>` +
      `<td class="dir-${t.dir}">${t.dir}</td>` +
      `<td class="proto">${t.proto === "BIDCOS" ? "BidCos" : "HmIP"}</td>` +
      `<td>${t.iface
        ? `<span class="via-lgw" title="via Funk-LAN-Gateway ${esc(t.iface)}">via ${esc(t.iface)}</span>`
        : `<span class="via-direkt">direkt</span>`}</td>` +
      `<td class="${rssiClass(t.rssi)}">${t.rssi === null ? "" : t.rssi}</td>` +
      `<td>${t.len}</td>` +
      `<td>${t.cnt === null ? "" : t.cnt.toString(16).padStart(2, "0").toUpperCase()}</td>` +
      `<td>${typeStr}</td>` +
      `<td class="flags">${flagsStr}</td>` +
      `<td>${t.from ? addrCell(t.from) : hmipFromCell(t)}</td>` +
      `<td>${t.to ? addrCell(t.to) : hmipToCell(t)}</td>` +
      `<td class="payload">${payloadCell(t)}</td>` +
      `</tr>`);
  }
  $("tbody").innerHTML = rows.join("");
  $("moreInfo").textContent = list.length > MAX_ROWS
    ? `Es werden die neuesten ${MAX_ROWS} Telegramme angezeigt (${list.length} gefiltert insgesamt). Filter nutzen oder CSV exportieren.` : "";
}

/* ------------------------------------------------- Analyse */

const PALETTE = ["#4da3ff", "#58c470", "#f0a04b", "#d46bd4", "#4fc9c4",
                 "#e05c5c", "#b8c44e", "#8f7ff0", "#d49a6b", "#6bd48f"];

function renderStats() {
  const list = filtered();
  const bidcos = list.filter(t => t.proto === "BIDCOS");
  const rx = list.filter(t => t.dir === "RX").length;

  // Kennzahlen
  const seen = new Set();
  for (const t of bidcos) { if (t.from) seen.add(t.from); }
  const span = list.length ? (list[list.length - 1].ts - list[0].ts) / 1000 : 0;
  const cards = [
    [list.length, "Telegramme"],
    [rx, "RX"], [list.length - rx, "TX"],
    [bidcos.length, "BidCos"],
    [list.length - bidcos.length, "HmIP"],
    [seen.size, "Sender gesehen"],
    [span > 3600 ? (span / 3600).toFixed(1) + " h" : Math.round(span / 60) + " min", "Zeitraum"]
  ];
  $("cards").innerHTML = cards.map(([n, l]) =>
    `<div class="card"><div class="num">${n}</div><div class="lbl">${l}</div></div>`).join("");

  drawRssiChart(bidcos.filter(t => t.rssi !== null));
  drawRateChart(list);
  renderDevStats(bidcos, span);
}

/* --- Geraete-Statistik --- */
let devSortKey = "total", devSortAsc = false;

function renderDevStats(bidcos, spanSec) {
  const agg = new Map();
  for (const t of bidcos) {
    if (!t.from) continue;
    let a = agg.get(t.from);
    if (!a) { a = { addr: t.from, rx: 0, tx: 0, rssiSum: 0, rssiN: 0, rssiMin: null, air: 0 }; agg.set(t.from, a); }
    if (t.dir === "RX") a.rx++; else a.tx++;
    a.air += airtimeMs(t.len);
    if (t.rssi !== null) {
      a.rssiSum += t.rssi; a.rssiN++;
      if (a.rssiMin === null || t.rssi < a.rssiMin) a.rssiMin = t.rssi;
    }
  }
  const rows = [...agg.values()];
  for (const r of rows) {
    r.total = r.rx + r.tx;
    r.rssiAvg = r.rssiN ? r.rssiSum / r.rssiN : null;
    // DutyCycle-Schaetzung: Anteil Sendezeit an Gesamtzeitraum
    r.dc = spanSec > 0 ? (r.air / 1000 / spanSec) * 100 : 0;
    r.name = devLabel(r.addr);
  }
  rows.sort((a, b) => {
    let va = a[devSortKey], vb = b[devSortKey];
    if (typeof va === "string") { va = va.toLowerCase(); vb = (vb || "").toLowerCase(); }
    if (va === null) va = -Infinity; if (vb === null) vb = -Infinity;
    return (va < vb ? -1 : va > vb ? 1 : 0) * (devSortAsc ? 1 : -1);
  });
  const maxTotal = rows.reduce((m, r) => Math.max(m, r.total), 1);
  const arrow = k => devSortKey === k ? (devSortAsc ? " ▲" : " ▼") : "";
  const html = [`<tr>
    <th data-k="name">Ger&auml;t${arrow("name")}</th>
    <th data-k="addr">Adresse${arrow("addr")}</th>
    <th data-k="total">Telegramme${arrow("total")}</th>
    <th></th>
    <th data-k="rx">RX${arrow("rx")}</th>
    <th data-k="tx">TX${arrow("tx")}</th>
    <th data-k="rssiAvg">&Oslash; RSSI${arrow("rssiAvg")}</th>
    <th data-k="rssiMin">min. RSSI${arrow("rssiMin")}</th>
    <th data-k="dc" title="geschaetzter Sendezeit-Anteil im gewaehlten Zeitraum">DutyCycle*${arrow("dc")}</th>
  </tr>`];
  for (const r of rows.slice(0, 40)) {
    const wRx = (r.rx / maxTotal) * 100, wTx = (r.tx / maxTotal) * 100;
    html.push(`<tr>
      <td>${esc(r.name)}</td>
      <td class="mono devaddr">${r.addr}</td>
      <td>${r.total}</td>
      <td><div class="bar-bg"><div class="bar-rx" style="left:0;width:${wRx}%"></div><div class="bar-tx" style="left:${wRx}%;width:${wTx}%"></div></div></td>
      <td>${r.rx}</td><td>${r.tx}</td>
      <td class="${rssiClass(r.rssiAvg)}">${r.rssiAvg === null ? "" : r.rssiAvg.toFixed(1)}</td>
      <td class="${rssiClass(r.rssiMin || null)}">${r.rssiN ? r.rssiMin : ""}</td>
      <td>${r.dc.toFixed(3)} %</td>
    </tr>`);
  }
  const tbl = $("devStats");
  tbl.innerHTML = html.join("");
  tbl.querySelectorAll("th[data-k]").forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    if (devSortKey === k) devSortAsc = !devSortAsc; else { devSortKey = k; devSortAsc = k === "name" || k === "addr"; }
    renderStats();
  });
}

/* --- Canvas-Basics --- */
function setupCanvas(cv) {
  const dpr = window.devicePixelRatio || 1;
  // Soll-Hoehe aus data-height: cv.height veraendert das height-Attribut,
  // sonst waechst der Canvas bei dpr>1 mit jedem Rendern weiter an
  const w = cv.clientWidth, h = parseInt(cv.dataset.height, 10);
  cv.width = w * dpr; cv.height = h * dpr; cv.style.height = h + "px";
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  return { ctx, w, h };
}
function timeTicks(ctx, x0, x1, t0, t1, y, w) {
  ctx.fillStyle = "#8a93a2"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
  const span = t1 - t0;
  if (span <= 0) return;
  const stepMs = span > 6 * 3600e3 ? 3600e3 : span > 2 * 3600e3 ? 1800e3 : span > 30 * 60e3 ? 600e3 : 60e3;
  let t = Math.ceil(t0 / stepMs) * stepMs;
  for (; t <= t1; t += stepMs) {
    const x = x0 + ((t - t0) / span) * (x1 - x0);
    ctx.fillText(new Date(t).toTimeString().slice(0, 5), x, y);
    ctx.strokeStyle = "#242a33"; ctx.beginPath(); ctx.moveTo(x, 8); ctx.lineTo(x, y - 10); ctx.stroke();
  }
}

/* --- RSSI-Chart --- */
let rssiPoints = [];   // fuer Tooltip: {x, y, t}

function drawRssiChart(data) {
  const cv = $("rssiChart");
  const { ctx, w, h } = setupCanvas(cv);
  rssiPoints = [];
  $("rssiLegend").innerHTML = "";
  if (!data.length) { ctx.fillStyle = "#8a93a2"; ctx.fillText("keine Daten", 20, 30); return; }

  const padL = 38, padR = 8, padT = 8, padB = 22;
  const t0 = data[0].ts, t1 = data[data.length - 1].ts || t0 + 1;
  let rMin = -110, rMax = -20;
  const x = t => padL + ((t - t0) / Math.max(t1 - t0, 1)) * (w - padL - padR);
  const y = r => padT + ((rMax - r) / (rMax - rMin)) * (h - padT - padB);

  // Y-Achse
  ctx.fillStyle = "#8a93a2"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
  for (let r = -20; r >= -110; r -= 20) {
    ctx.fillText(r, padL - 6, y(r) + 3);
    ctx.strokeStyle = "#242a33"; ctx.beginPath(); ctx.moveTo(padL, y(r)); ctx.lineTo(w - padR, y(r)); ctx.stroke();
  }
  timeTicks(ctx, padL, w - padR, t0, t1, h - 6, w);

  // Top-Sender fuer Farben
  const cnt = new Map();
  for (const t of data) cnt.set(t.from, (cnt.get(t.from) || 0) + 1);
  const top = [...cnt.entries()].sort((a, b) => b[1] - a[1]).slice(0, PALETTE.length).map(e => e[0]);
  const colorOf = a => { const i = top.indexOf(a); return i < 0 ? "#5a636f" : PALETTE[i]; };

  for (const t of data) {
    const px = x(t.ts), py = y(Math.max(Math.min(t.rssi, rMax), rMin));
    ctx.fillStyle = colorOf(t.from);
    ctx.globalAlpha = 0.85;
    ctx.beginPath(); ctx.arc(px, py, 2.2, 0, 7); ctx.fill();
    rssiPoints.push({ x: px, y: py, t });
  }
  ctx.globalAlpha = 1;

  $("rssiLegend").innerHTML = top.map((a, i) =>
    `<span><i style="background:${PALETTE[i]}"></i>${esc(devLabel(a))}</span>`).join("") +
    (cnt.size > top.length ? `<span><i style="background:#5a636f"></i>weitere</span>` : "");
}

/* --- Raten-Chart --- */
function drawRateChart(list) {
  const cv = $("rateChart");
  const { ctx, w, h } = setupCanvas(cv);
  if (!list.length) return;
  const padL = 38, padR = 8, padT = 6, padB = 22;
  const t0 = Math.floor(list[0].ts / 60e3) * 60e3;
  const t1 = Math.ceil(list[list.length - 1].ts / 60e3) * 60e3;
  const nBuckets = Math.max(Math.round((t1 - t0) / 60e3), 1);
  const rxB = new Array(nBuckets).fill(0), txB = new Array(nBuckets).fill(0);
  for (const t of list) {
    const i = Math.min(Math.floor((t.ts - t0) / 60e3), nBuckets - 1);
    if (t.dir === "RX") rxB[i]++; else txB[i]++;
  }
  const maxV = Math.max(...rxB.map((v, i) => v + txB[i]), 1);
  const bw = (w - padL - padR) / nBuckets;
  const yv = v => padT + (1 - v / maxV) * (h - padT - padB);

  ctx.fillStyle = "#8a93a2"; ctx.font = "10px sans-serif"; ctx.textAlign = "right";
  for (const v of [maxV, Math.round(maxV / 2)]) {
    ctx.fillText(v, padL - 6, yv(v) + 3);
    ctx.strokeStyle = "#242a33"; ctx.beginPath(); ctx.moveTo(padL, yv(v)); ctx.lineTo(w - padR, yv(v)); ctx.stroke();
  }
  timeTicks(ctx, padL, w - padR, t0, t1, h - 6, w);
  for (let i = 0; i < nBuckets; i++) {
    const x = padL + i * bw;
    const hRx = (rxB[i] / maxV) * (h - padT - padB);
    const hTx = (txB[i] / maxV) * (h - padT - padB);
    ctx.fillStyle = "#58c470";
    ctx.fillRect(x, h - padB - hRx, Math.max(bw - 1, 1), hRx);
    ctx.fillStyle = "#f0a04b";
    ctx.fillRect(x, h - padB - hRx - hTx, Math.max(bw - 1, 1), hTx);
  }
}

/* --- Tooltip fuer RSSI-Chart --- */
$("rssiChart").addEventListener("mousemove", ev => {
  const rect = ev.target.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  let best = null, bestD = 12 * 12;
  for (const p of rssiPoints) {
    const d = (p.x - mx) ** 2 + (p.y - my) ** 2;
    if (d < bestD) { bestD = d; best = p; }
  }
  const tip = $("tooltip");
  if (!best) { tip.style.display = "none"; return; }
  tip.textContent = `${devLabel(best.t.from)}\n${best.t.time}  ${best.t.rssi} dBm  ${decodeType(best.t.type, best.t.payload)}`;
  tip.style.display = "block";
  tip.style.left = (ev.clientX + 14) + "px";
  tip.style.top = (ev.clientY + 10) + "px";
});
$("rssiChart").addEventListener("mouseleave", () => $("tooltip").style.display = "none");

/* ------------------------------------------------- CSV */

function exportCsv() {
  const list = filtered();
  const head = "tstamp;date;time;direction;protocol;via;rssi;len;cnt;type;flags;fromAddr;fromName;toAddr;toName;payload";
  const lines = [head];
  for (const t of list) {
    const q = s => {
      let v = String(s == null ? "" : s);
      // Formel-Injection in Tabellenkalkulationen neutralisieren (=, +, -, @, Tab, CR)
      if (/^[=+\-@\t\r]/.test(v)) v = "'" + v;
      return `"${v.replace(/"/g, '""')}"`;
    };
    const hf = !t.from && hmipAddrAt(t, 8), ht = !t.to && hmipAddrAt(t, 14);
    lines.push([
      t.ts, new Date(t.ts).toISOString().slice(0, 10), t.time, t.dir, t.proto,
      t.iface || "direkt",
      t.rssi == null ? "" : t.rssi, t.len,
      t.cnt == null ? "" : t.cnt,
      t.proto === "HMIP" ? "" : decodeType(t.type, t.payload),
      t.proto === "HMIP" ? "" : decodeFlags(t.flags).join("|"),
      t.from || hf || "", q(devLabel(t.from) || (hf ? hmipName(hf) : "")),
      t.to || ht || (t.bcast ? t.bcast.join("|") : ""),
      q(devLabel(t.to) || (ht ? hmipName(ht) : (t.bcast ? t.bcast.map(a => HMIP_BCAST[a]).join("|") : ""))),
      t.payload
    ].join(";"));
  }
  const blob = new Blob(["﻿" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `rftrafficlogger_${state.date || "export"}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ------------------------------------------------- Polling / Steuerung */

function setStatus(cls, text) {
  $("status").innerHTML = `<span class="dot ${cls}"></span>${text}`;
}

let pollInFlight = false;

// holt neue Logzeilen einer Quelle (mmd = multimacd/lokales Funkmodul,
// rfd = Funk-LAN-Gateways) ab dem gemerkten Datei-Offset
async function fetchChunk(src, date) {
  const r = await fetch(`${API}?cmd=data&date=${date}&offset=${state.offsets[src]}` +
    (src === "rfd" ? "&src=rfd" : ""));
  const text = await r.text();
  // Datum wurde waehrend des Requests gewechselt: Antwort verwerfen
  if (date !== state.date) return 0;
  const nl = text.indexOf("\n");
  const newOffset = parseInt(text.slice(0, nl).replace("OFFSET ", ""), 10);
  if (isNaN(newOffset)) return 0;
  const added = ingest(text.slice(nl + 1));
  state.offsets[src] = newOffset;
  return added;
}

async function poll() {
  if (state.paused || !state.date) return;
  // nur ein Request gleichzeitig - sonst wird derselbe Offset-Bereich bei
  // langsamem Netz mehrfach geholt und doppelt ingestet
  if (pollInFlight) return;
  pollInFlight = true;
  const date = state.date;
  try {
    const added = (await fetchChunk("mmd", date)) + (await fetchChunk("rfd", date));
    if (added > 0) {
      // beide Quellen chronologisch mergen (stabiler Sort, Liste ist fast sortiert)
      state.telegrams.sort((a, b) => a.ts - b.ts);
      rebuildFilterOptions();
      render();
    }
    setStatus(state.live ? "" : "paused",
      `<b>${state.telegrams.length}</b> Telegramme${state.live ? " · live" : ""}`);
  } catch (e) {
    setStatus("off", "Verbindungsfehler");
  } finally {
    pollInFlight = false;
  }
}

async function loadDates(keepSelection) {
  try {
    const r = await fetch(API + "?cmd=dates");
    const dates = await r.json();
    const sel = $("dateSel");
    const cur = sel.value;
    sel.length = 0;
    for (const d of dates.slice().reverse()) sel.add(new Option(d, d));
    if (keepSelection && dates.includes(cur)) sel.value = cur;
    return dates;
  } catch (e) { return []; }
}

function switchDate(date, latest) {
  state.date = date;
  state.live = (date === latest);
  state.offsets = { mmd: 0, rfd: 0 };
  state.telegrams = [];
  state.types.clear();
  state.addrs.clear();
  state.hmipSeen.clear();
  state.ifaces.clear();
  render();
  poll();
}

function render() {
  if (state.tab === "telegrams") renderTable(); else renderStats();
}

function switchTab(tab) {
  state.tab = tab;
  $("tabTelegrams").classList.toggle("active", tab === "telegrams");
  $("tabStats").classList.toggle("active", tab === "stats");
  $("viewTelegrams").style.display = tab === "telegrams" ? "" : "none";
  $("viewStats").style.display = tab === "stats" ? "" : "none";
  render();
}

/* --- Events --- */
$("tabTelegrams").onclick = () => switchTab("telegrams");
$("tabStats").onclick = () => switchTab("stats");
$("pauseBtn").onclick = () => {
  state.paused = !state.paused;
  $("pauseBtn").innerHTML = state.paused ? "&#9654; Weiter" : "&#10074;&#10074; Pause";
  $("pauseBtn").classList.toggle("active", state.paused);
  if (!state.paused) poll();
};
$("csvBtn").onclick = exportCsv;
$("devBtn").onclick = () => loadDevList(true);
$("dateSel").onchange = async () => {
  const dates = await loadDates(true);
  switchDate($("dateSel").value, dates[dates.length - 1]);
};
for (const id of ["fSearch", "fDir", "fProto", "fVia", "fType", "fDev", "fHideBcast"]) {
  $(id).addEventListener(id === "fSearch" ? "input" : "change", render);
}
window.addEventListener("resize", () => { if (state.tab === "stats") renderStats(); });

/* --- Init --- */
(async function init() {
  fetch(API + "?cmd=version").then(r => r.json())
    .then(j => { if (j.version) $("version").textContent = "v" + j.version; })
    .catch(() => {});
  loadDevList(false);
  const dates = await loadDates(false);
  const today = new Date().toISOString().slice(0, 10);
  const latest = dates.length ? dates[dates.length - 1] : today;
  $("dateSel").value = latest;
  switchDate(latest, latest);
  setInterval(async () => {
    // Mitternachts-Rollover: neueste Datei folgt automatisch, wenn "live"
    if (state.live) {
      const ds = await loadDates(true);
      const newest = ds[ds.length - 1];
      if (newest && newest !== state.date) { $("dateSel").value = newest; switchDate(newest, newest); return; }
    }
    poll();
  }, POLL_MS);
})();
</script>
